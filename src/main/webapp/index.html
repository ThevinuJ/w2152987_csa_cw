<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Smart Campus API</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            background: linear-gradient(135deg, #0f2027, #203a43, #2c5364);
            color: #ffffff;
        }
        .container {
            text-align: center;
            padding: 3rem;
            background: rgba(255, 255, 255, 0.05);
            border-radius: 16px;
            border: 1px solid rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(10px);
        }
        .status-dot {
            display: inline-block;
            width: 12px;
            height: 12px;
            background: #00e676;
            border-radius: 50%;
            margin-right: 8px;
            animation: pulse 2s infinite;
        }
        h1 { font-size: 2rem; margin-bottom: 0.5rem; }
        p { color: #b0bec5; margin-top: 0.75rem; font-size: 0.95rem; }
        a { color: #4fc3f7; text-decoration: none; }
        a:hover { text-decoration: underline; }
        @keyframes pulse {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.4; }
        }
    </style>
</head>
<body>
    <div class="container">
        <h1><span class="status-dot"></span>Smart Campus API is Running</h1>
        <p>REST API Base URL: <a href="api/v1">/api/v1</a></p>
        <p>Student ID: w2152987</p>
    </div>
</body>
</html>
